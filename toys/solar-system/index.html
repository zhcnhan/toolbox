<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 太阳系模拟器</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; background:#080012; font-family:'Segoe UI','PingFang SC',sans-serif; color:#e0e8f0; }
canvas { display:block; }

#controls {
  position:fixed; right:16px; top:16px; width:280px; max-height:calc(100vh - 32px);
  background:rgba(8,0,18,0.85); backdrop-filter:blur(16px);
  border:1px solid rgba(0,255,247,0.12); border-radius:14px;
  padding:16px; overflow-y:auto; z-index:100; font-size:13px;
}
#controls::-webkit-scrollbar { width:3px; }
#controls::-webkit-scrollbar-thumb { background:rgba(0,255,247,0.3); border-radius:2px; }
#controls h2 { font-size:15px; margin-bottom:10px; font-weight:700;
  background:linear-gradient(90deg,#00fff7,#a855f7,#ff00aa);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

.ctrl-group { margin-bottom:12px; }
.ctrl-group h3 { font-size:11px; font-weight:600; color:rgba(255,255,255,0.4); margin-bottom:6px; letter-spacing:1px; }

.slider-row { display:flex; align-items:center; gap:6px; margin-bottom:4px; font-size:12px; }
.slider-row label { width:60px; flex-shrink:0; }
.slider-row input[type="range"] { flex:1; -webkit-appearance:none; height:3px; background:rgba(0,255,247,0.15); border-radius:2px; outline:none; }
.slider-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:#00fff7; cursor:pointer; box-shadow:0 0 6px rgba(0,255,247,0.5); }
.slider-row .val { width:30px; text-align:right; color:#00fff7; font-weight:600; font-size:11px; }

.toggle-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; font-size:12px; cursor:pointer; }
.toggle-row input[type="checkbox"] { -webkit-appearance:none; width:32px; height:18px; background:rgba(255,255,255,0.08); border-radius:9px; cursor:pointer; position:relative; transition:0.2s; }
.toggle-row input[type="checkbox"]:checked { background:#00fff7; box-shadow:0 0 8px rgba(0,255,247,0.3); }
.toggle-row input[type="checkbox"]::before { content:''; position:absolute; width:14px; height:14px; left:2px; top:2px; border-radius:50%; background:white; transition:0.2s; }
.toggle-row input[type="checkbox"]:checked::before { left:16px; }

#info-tip {
  position:fixed; pointer-events:none; z-index:50;
  background:rgba(8,0,18,0.8); backdrop-filter:blur(8px);
  border:1px solid rgba(0,255,247,0.2); border-radius:10px;
  padding:8px 12px; font-size:12px;
  opacity:0; transition:opacity 0.2s;
}
#info-tip.visible { opacity:1; }

#title { position:fixed; left:16px; bottom:16px; z-index:100; font-size:10px; color:rgba(255,255,255,0.1); pointer-events:none; }
</style>
</head>
<body>
<div id="controls">
  <h2>🌌 太阳系控制台</h2>
  <div class="ctrl-group">
    <h3>⚡ 全局</h3>
    <div class="slider-row"><label>时间流速</label><input type="range" id="global-speed" min="0" max="5" step="0.1" value="1"><span class="val" id="global-speed-val">1×</span></div>
    <div class="toggle-row"><span>显示轨道</span><input type="checkbox" id="show-orbits" checked></div>
    <div class="toggle-row"><span>显示名称</span><input type="checkbox" id="show-labels" checked></div>
    <div class="toggle-row"><span>暂停</span><input type="checkbox" id="pause-sim"></div>
  </div>
  <div class="ctrl-group">
    <h3>🪐 轨道速度</h3>
    <div id="planet-speeds"></div>
  </div>
</div>
<div id="info-tip"></div>
<div id="title">🪐 我的太阳系 · 滚轮缩放 · 点击行星</div>
<canvas id="canvas"></canvas>

<script>
// ═══════════════════════════════════════════
// 行星数据
// ═══════════════════════════════════════════
const PLANETS = [
  { name:'水星', color:'#c0c0c0', size:4, orbit:35, speed:4.15, tilt:0.03, info:'最小行星，距太阳最近' },
  { name:'金星', color:'#e8c87a', size:7, orbit:55, speed:1.62, tilt:177, info:'自转最慢，逆向自转' },
  { name:'地球', color:'#4488ff', size:8, orbit:75, speed:1.0,  tilt:23.4, info:'我们的家 🌍' },
  { name:'火星', color:'#d87a4f', size:6, orbit:95, speed:0.53, tilt:25.2, info:'红色星球' },
  { name:'木星', color:'#d4a06a', size:16, orbit:130, speed:0.084, tilt:3.1, info:'最大的行星，有红斑' },
  { name:'土星', color:'#e8d5a0', size:13, orbit:165, speed:0.034, tilt:26.7, info:'有美丽的光环' },
  { name:'天王星', color:'#7ec8e3', size:10, orbit:200, speed:0.012, tilt:97.8, info:'侧躺着转的冰巨星' },
  { name:'海王星', color:'#3355ff', size:9, orbit:235, speed:0.006, tilt:28.3, info:'最远的行星，风速最快' },
  { name:'冥王星', color:'#ccbbaa', size:4, orbit:265, speed:0.004, tilt:0, info:'矮行星，曾被踢出行星家族' },
];

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, CX, CY, scale = 1, offsetX = 0, offsetY = 0;
let dragStart = null, isDragging = false;
let angles = PLANETS.map(()=>Math.random()*Math.PI*2);
let speeds = PLANETS.map(()=>1);
let globalSpeed = 1, showOrbits = true, showLabels = true, paused = false;
let hoveredIdx = -1;
let tipEl = document.getElementById('info-tip');

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W/2 + offsetX; CY = H/2 + offsetY;
}
window.addEventListener('resize', resize);
resize();

// ═══════════════════════════════════════════
// 控制面板
// ═══════════════════════════════════════════
const speedContainer = document.getElementById('planet-speeds');
PLANETS.forEach((p,i)=>{
  const c = ['#00fff7','#e8c87a','#4488ff','#d87a4f','#d4a06a','#e8d5a0','#7ec8e3','#3355ff','#ccbbaa'];
  const row = document.createElement('div'); row.className = 'slider-row';
  row.innerHTML = `<label style="color:${c[i]}">${p.name}</label><input type="range" min="0" max="5" step="0.1" value="1" data-idx="${i}"><span class="val" id="sv${i}">1×</span>`;
  speedContainer.appendChild(row);
  row.querySelector('input').addEventListener('input', e=>{
    const v=+e.target.value; speeds[i]=v; document.getElementById('sv'+i).textContent=v.toFixed(1)+'×';
  });
});

document.getElementById('global-speed').addEventListener('input', e=>{
  globalSpeed=+e.target.value; document.getElementById('global-speed-val').textContent=globalSpeed.toFixed(1)+'×';
});
document.getElementById('show-orbits').addEventListener('change', e=>{ showOrbits=e.target.checked; });
document.getElementById('show-labels').addEventListener('change', e=>{ showLabels=e.target.checked; });
document.getElementById('pause-sim').addEventListener('change', e=>{ paused=e.target.checked; });

// ═══════════════════════════════════════════
// 鼠标交互
// ═══════════════════════════════════════════
canvas.addEventListener('mousedown', e=>{
  if (hoveredIdx >= 0) return; // 点击行星时不移屏
  dragStart = { x: e.clientX - offsetX, y: e.clientY - offsetY };
  isDragging = true;
});
canvas.addEventListener('mousemove', e=>{
  if (isDragging && dragStart) {
    offsetX = e.clientX - dragStart.x;
    offsetY = e.clientY - dragStart.y;
    CX = W/2 + offsetX; CY = H/2 + offsetY;
  }
  // 检测悬停
  const mx = e.clientX, my = e.clientY;
  let found = -1;
  for (let i=0; i<PLANETS.length; i++) {
    const p = PLANETS[i];
    const r = p.size * 0.5 + 3;
    const px = Math.cos(angles[i]) * p.orbit + CX;
    const py = Math.sin(angles[i]) * p.orbit + CY;
    if (Math.sqrt((mx-px)**2+(my-py)**2) < r) { found=i; break; }
  }
  hoveredIdx = found;
  canvas.style.cursor = found >= 0 ? 'pointer' : isDragging ? 'grabbing' : 'grab';
});
canvas.addEventListener('mouseup', ()=> { isDragging=false; dragStart=null; });
canvas.addEventListener('mouseleave', ()=> { isDragging=false; dragStart=null; });
canvas.addEventListener('wheel', e=>{
  scale = Math.max(0.3, Math.min(3, scale - e.deltaY * 0.001));
  e.preventDefault();
}, {passive:false});

canvas.addEventListener('click', e=>{
  if (hoveredIdx >= 0) {
    const p = PLANETS[hoveredIdx];
    tipEl.innerHTML = `<b>${p.name}</b><br><span style="color:rgba(255,255,255,0.5);font-size:11px">${p.info}</span>`;
    tipEl.classList.add('visible');
    tipEl.style.left = (e.clientX + 12) + 'px';
    tipEl.style.top = (e.clientY - 8) + 'px';
  } else {
    tipEl.classList.remove('visible');
  }
});

// ═══════════════════════════════════════════
// 渲染
// ═══════════════════════════════════════════
function drawStar(x,y,r,color,glow) {
  if (glow) {
    const g = ctx.createRadialGradient(x,y,0,x,y,r*3);
    g.addColorStop(0, glow); g.addColorStop(1,'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x,y,r*3,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowColor = color; ctx.shadowBlur = glow ? 30 : 0;
  ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
}

function drawOrbit(rx, color='rgba(0,255,247,0.12)') {
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(CX,CY,rx,rx*0.6,0,0,Math.PI*2); ctx.stroke();
}

let time = 0;

function frame() {
  requestAnimationFrame(frame);
  if (!paused) {
    const dt = 0.015 * globalSpeed;
    time += dt;
    for (let i=0; i<PLANETS.length; i++) {
      angles[i] += dt * PLANETS[i].speed * speeds[i] * 0.4;
    }
  }

  ctx.clearRect(0,0,W,H);

  // 星空
  ctx.fillStyle = '#080012';
  ctx.fillRect(0,0,W,H);
  // 星星
  if (!window._stars) {
    window._stars = Array.from({length:200}, ()=>[Math.random()*W, Math.random()*H, 0.5+Math.random()*1.5, 0.3+Math.random()*0.7]);
  }
  window._stars.forEach(s=>{
    ctx.fillStyle = `rgba(255,255,255,${s[3]*0.6})`;
    ctx.beginPath(); ctx.arc(s[0],s[1],s[2]*0.5,0,Math.PI*2); ctx.fill();
  });

  // 轨道
  if (showOrbits) {
    for (let i=0; i<PLANETS.length; i++) {
      drawOrbit(PLANETS[i].orbit, i===PLANETS.length-1 ? 'rgba(136,102,170,0.12)' : 'rgba(0,255,247,0.12)');
    }
  }

  // 太阳
  const sunPulse = 1 + Math.sin(time*2)*0.03;
  drawStar(CX, CY, 14*sunPulse, '#ffdd44', 'rgba(255,200,50,0.15)');
  drawStar(CX, CY, 10*sunPulse, '#ffcc22', 'rgba(255,200,50,0.08)');

  // 行星
  for (let i=0; i<PLANETS.length; i++) {
    const p = PLANETS[i];
    const x = Math.cos(angles[i]) * p.orbit + CX;
    const y = Math.sin(angles[i]) * p.orbit * 0.6 + CY;
    const r = p.size * 0.5;

    // 土星环
    if (p.name === '土星') {
      ctx.save(); ctx.translate(x,y); ctx.scale(1,0.3);
      ctx.strokeStyle = 'rgba(212,196,160,0.3)';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0,0,r*2,0,Math.PI*2); ctx.stroke();
      ctx.strokeStyle = 'rgba(212,196,160,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0,0,r*3,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // 行星本体
    const isHover = i === hoveredIdx;
    drawStar(x, y, isHover ? r*1.3 : r, p.color, isHover ? p.color+'44' : null);

    // 名称
    if (showLabels) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '11px "Segoe UI","PingFang SC",sans-serif';
      ctx.textAlign = 'center'; ctx.fillText(p.name, x, y - r - 8);
    }
  }

  // 缩放指示
  if (scale !== 1) {
    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.font = '11px sans-serif';
    ctx.textAlign = 'left'; ctx.fillText('缩放: ' + scale.toFixed(1) + '×', 16, 16);
  }
}

frame();
console.log('🌌 太阳系模拟器已启动！🪐');
console.log('💡 拖拽平移 · 滚轮缩放 · 点击行星查看信息');
</script>
</body>
</html>
