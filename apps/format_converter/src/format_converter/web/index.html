<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Format Converter</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- ====== 背景层 ====== -->
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>

    <!-- ====== 主容器 ====== -->
    <div class="app-container">

        <!-- 头部 -->
        <header class="header">
            <div class="header-brand">
                <span class="logo">⚡</span>
                <div>
                    <h1 class="header-title">Format Converter</h1>
                    <p class="header-subtitle">数据 · 音频 · 视频 · 图片 — 一站式格式转换</p>
                </div>
            </div>
            <div class="header-status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">就绪</span>
            </div>
        </header>

        <!-- 标签栏 -->
        <nav class="tabs-nav">
            <button class="tab-btn active" data-category="data">
                <span class="tab-icon">📊</span> 数据格式
            </button>
            <button class="tab-btn" data-category="audio">
                <span class="tab-icon">🎵</span> 音频格式
            </button>
            <button class="tab-btn" data-category="video">
                <span class="tab-icon">🎬</span> 视频格式
            </button>
            <button class="tab-btn" data-category="image">
                <span class="tab-icon">🖼️</span> 图片格式
            </button>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">

            <!-- 格式选择栏 -->
            <section class="format-bar glass-card">
                <div class="format-row">
                    <div class="format-field">
                        <label>源格式</label>
                        <select id="srcFormat">
                            <option value="auto">自动检测</option>
                        </select>
                    </div>
                    <div class="format-arrow">→</div>
                    <div class="format-field">
                        <label>目标格式</label>
                        <select id="dstFormat"></select>
                    </div>
                    <div class="format-field output-dir-field">
                        <label>输出目录</label>
                        <div class="dir-input-group">
                            <input type="text" id="outputDir" placeholder="留空则与源文件同目录">
                            <button class="btn btn-ghost" id="btnBrowseDir">浏览</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 拖放区 -->
            <section class="drop-section">
                <div class="drop-zone" id="dropZone">
                    <div class="drop-icon">📂</div>
                    <div class="drop-text">
                        <span class="drop-primary">拖放文件到此处</span>
                        <span class="drop-secondary">或点击下方按钮选择文件</span>
                    </div>
                </div>
                <button class="btn btn-outline" id="btnAddFiles">
                    <span>+</span> 添加文件
                </button>
            </section>

            <!-- 文件列表 -->
            <section class="file-list-section glass-card">
                <div class="file-list-header">
                    <h3>文件列表</h3>
                    <div class="file-list-actions">
                        <span class="file-count" id="fileCount">0 个文件</span>
                        <button class="btn btn-sm btn-ghost" id="btnRemoveSel">移除选中</button>
                        <button class="btn btn-sm btn-ghost" id="btnClearAll">清空</button>
                    </div>
                </div>
                <div class="file-list" id="fileList">
                    <div class="file-list-empty">
                        <span>📭</span>
                        <p>尚未添加文件</p>
                    </div>
                </div>
            </section>

            <!-- 进度面板 -->
            <section class="progress-section glass-card" id="progressSection">
                <div class="progress-header">
                    <div class="progress-info">
                        <span class="progress-label">转换进度</span>
                        <span class="progress-percent" id="progressPercent">0%</span>
                    </div>
                    <button class="btn btn-danger btn-sm" id="btnCancel" style="display:none">取消</button>
                </div>
                <!-- 整体进度 -->
                <div class="progress-bar-wrap">
                    <div class="progress-bar" id="overallBar">
                        <div class="progress-fill" id="overallFill"></div>
                    </div>
                </div>
                <!-- 单文件进度 -->
                <div class="progress-bar-wrap progress-bar-wrap--small">
                    <div class="progress-bar" id="fileBar">
                        <div class="progress-fill progress-fill--file" id="fileFill"></div>
                    </div>
                </div>
                <span class="current-file" id="currentFile"></span>
            </section>

            <!-- 转换按钮 -->
            <div class="convert-action">
                <button class="btn btn-primary btn-large" id="btnConvert" disabled>
                    <span>▶</span> 开始转换
                </button>
            </div>

            <!-- 日志区 -->
            <section class="log-section glass-card" id="logSection">
                <div class="log-header">
                    <h3>转换日志</h3>
                    <button class="btn btn-sm btn-ghost" id="btnClearLog">清除</button>
                </div>
                <div class="log-output" id="logOutput">
                    <div class="log-empty">等待转换任务...</div>
                </div>
            </section>

            <!-- 格式说明 -->
            <section class="format-info-section" id="formatInfo">
            </section>

        </main>

        <!-- 底部 -->
        <footer class="footer">
            <span>Format Converter v1.0.0</span>
            <span class="footer-sep">·</span>
            <span>zhcnhan</span>
            <span class="footer-sep">·</span>
            <span>MIT License</span>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
