# =========================================================================
# Nginx 反向代理配置示例
# 用于将 Batch Background Remover 部署到带 HTTPS 的域名
# =========================================================================
# 用法：
#   1. 复制到 /etc/nginx/sites-available/batch-bg-remover
#   2. 修改 server_name 为你的域名
#   3. ln -s /etc/nginx/sites-available/batch-bg-remover /etc/nginx/sites-enabled/
#   4. certbot --nginx -d your-domain.com  (申请 HTTPS)
#   5. nginx -t && systemctl reload nginx
# =========================================================================

# 上传大小限制（50MB 图片 + 余量）
client_max_body_size 60m;

server {
    listen 80;
    server_name your-domain.com;

    # 如果用 HTTPS，certbot 会自动添加 443 配置

    # API 接口
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 上传/下载超时设置（大图处理可能较慢）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # 前端静态文件 + SPA 路由
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存
    location /assets/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, immutable";
    }
}
