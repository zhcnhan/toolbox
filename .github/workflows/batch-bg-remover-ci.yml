name: Batch Background Remover CI

on:
  push:
    paths:
      - "apps/batch_bg_remover/**"
      - ".github/workflows/batch-bg-remover-ci.yml"
  pull_request:
    paths:
      - "apps/batch_bg_remover/**"

jobs:
  # macOS: 验证原生运行（不用 Docker）
  test-macos-native:
    name: macOS Native
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/batch_bg_remover/backend/requirements.txt

      - name: Backend - install deps
        working-directory: apps/batch_bg_remover/backend
        run: pip install -r requirements.txt

      - name: Backend - start server & health check
        working-directory: apps/batch_bg_remover/backend
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8001 &
          sleep 3
          curl -s -o /dev/null -w "Health: %{http_code}\n" http://127.0.0.1:8001/api/health
          curl -s http://127.0.0.1:8001/api/engines | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f'  {e[\"id\"]}') for e in d['engines']]"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/batch_bg_remover/frontend/package-lock.json

      - name: Frontend - install & build
        working-directory: apps/batch_bg_remover/frontend
        run: |
          npm ci
          npm run build
          ls -la ../backend/static/assets/*.js
          echo "OK: $(du -sh ../backend/static/assets/ | cut -f1)"

  # Linux Docker: 验证容器化部署（镜像与 macOS Docker Desktop 通用）
  test-docker:
    name: Docker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/batch_bg_remover

    steps:
      - uses: actions/checkout@v5

      - name: Build & start
        run: |
          docker compose build
          docker compose up -d

      - name: Verify
        run: |
          sleep 5
          curl -s -o /dev/null -w "Health: %{http_code}\n" http://127.0.0.1:8001/api/health
          curl -s http://127.0.0.1:8001/api/proxy | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Proxy: OK')"
          curl -s http://127.0.0.1:8001/api/engines | python3 -c "import sys,json; print(f'Engines: {len(json.load(sys.stdin)[\"engines\"])}')"
