name: Batch Background Remover CI

on:
  push:
    paths:
      - "apps/batch_bg_remover/**"
      - ".github/workflows/batch-bg-remover-ci.yml"
  pull_request:
    paths:
      - "apps/batch_bg_remover/**"

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

jobs:
  test-backend:
    name: Backend (Python)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/batch_bg_remover/backend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/batch_bg_remover/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start server & health check
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8001 &
          sleep 3
          echo "=== Health ==="
          curl -s -o /dev/null -w "%{http_code}\n" http://127.0.0.1:8001/api/health
          echo "=== Engines ==="
          curl -s http://127.0.0.1:8001/api/engines | python3 -c "import sys,json; d=json.load(sys.stdin); [print(f'  {e[\"id\"]:20} type={e[\"type\"]}') for e in d['engines']]"

  test-frontend:
    name: Frontend (Node)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/batch_bg_remover/frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/batch_bg_remover/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          ls -la ../backend/static/assets/*.js
          echo "Total JS size: $(du -sh ../backend/static/assets/ | cut -f1)"

  test-docker:
    name: Docker Build (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/batch_bg_remover

    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker compose build

      - name: Start container
        run: docker compose up -d

      - name: Health check
        run: |
          sleep 8
          curl -s -o /dev/null -w "Health: %{http_code}\n" http://127.0.0.1:8001/api/health

      - name: Test proxy API
        run: |
          curl -s http://127.0.0.1:8001/api/proxy | python3 -c "import sys,json; d=json.load(sys.stdin); print('Proxy API: OK')"
